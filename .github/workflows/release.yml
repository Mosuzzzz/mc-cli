name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mc-cli-x86_64-unknown-linux-gnu

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            artifact: mc-cli-aarch64-unknown-linux-gnu

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: mc-cli-x86_64-apple-darwin

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mc-cli-aarch64-apple-darwin

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mc-cli-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross-compiled)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/mc-cli ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/mc-cli.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          sha256sum mc-cli-* > sha256sums.txt
          echo "=== sha256sums.txt ==="
          cat sha256sums.txt

      - name: Bundle install scripts into release
        run: |
          TAG="${{ github.ref_name }}"
          # Rewrite install scripts to use pinned release URL instead of master
          sed "s|/master/install.sh|/releases/download/${TAG}/install.sh|g" install.sh > artifacts/install.sh
          sed "s|/master/install.ps1|/releases/download/${TAG}/install.ps1|g" install.ps1 > artifacts/install.ps1
          chmod +x artifacts/install.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
